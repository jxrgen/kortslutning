    <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.48  0 0 0 0 0.42  0 0 0 0 0.36  0 0 0 0.07 0" result="g"/>
    <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
  </filter>
